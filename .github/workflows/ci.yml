name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # System deps mirror Dockerfile.linux's apt-get list, PLUS
      # mesa-vulkan-drivers so the wgpu-backed capture tests have a software
      # Vulkan adapter to run against on a headless GitHub runner (there is
      # no real GPU here).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig1-dev libxkbcommon-dev libwayland-dev \
            libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            mesa-vulkan-drivers

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Dev-profile build + test, matching local practice (CLAUDE.md's build
      # section runs `cargo build` / `cargo test`, not --release). No
      # artifact upload for v1 — nothing built here is `--release`, and
      # speed matters more than a dev binary nobody will download.
      - name: cargo build
        run: cargo build

      # Linux-convention gate (settled): this job's `cargo test` runs under
      # `Convention::Linux` (a real `cfg(target_os)` fact on this runner — see
      # `Convention::current()`), which reads Ctrl-chords as the native slot
      # instead of macOS's ⌘-chords. Earlier rounds ran this step allow-failure
      # while the suite's tests — largely written against a Mac-only ambient
      # keymap — caught up; the whole convention-blindness sweep (pinning
      # hardcoded mac-literal test expectations to `Convention::Mac` explicitly,
      # or making chord-label assertions convention-parametric via the same
      # resolvers production code uses) is complete and the suite is genuinely
      # green under both conventions (verified via the `AWL_CONVENTION_FORCE`
      # dev knob locally, matching this runner's real `cfg(target_os)` path).
      # So this step is now a REAL, BLOCKING gate — no more allow-failure.
      - name: cargo test
        run: cargo test

  web:
    name: web (wasm build + smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: web

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      # wasm-bindgen-cli's version must match the crate's pinned wasm-bindgen
      # (Cargo.toml: 0.2.121, see WEB.md). trunk builds the release web
      # bundle (dist/) for the artifact upload.
      - name: Install wasm-bindgen-cli + trunk
        run: |
          cargo install wasm-bindgen-cli --version 0.2.121 --locked
          cargo install trunk --locked

      # L1 (crate compiles to wasm32) + L2 (src/websmoke.rs
      # #[wasm_bindgen_test]s run through the node runner) — see
      # scripts/web-smoke.sh's own header comment for the stage breakdown.
      - name: scripts/web-smoke.sh (L1 + L2)
        run: scripts/web-smoke.sh

      # with-remap.sh strips the builder's $HOME/registry paths from the wasm
      # (rustc bakes compile-time source locations); the uploaded artifact is
      # public, so it must carry no builder path.
      - name: trunk build --release
        run: scripts/with-remap.sh trunk build --release

      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: dist/
          retention-days: 14

  mac:
    name: mac (build + test)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build

      - name: cargo test
        run: cargo test

  # ── The mac live-probe (free mac-VM tier — now GATING) ──────────────────────
  # GitHub's macos-latest runners are real macOS VMs with a WindowServer, and
  # the "does a headful awl window PRESENT frames there?" question has been
  # answered YES: a headful awl window clears the wgpu occlusion gate (an
  # NSWindow lacking NSWindowOcclusionStateVisible returns Occluded BEFORE
  # nextDrawable() → presents=0 — see CLAUDE.md's --soak-gpu tripwire) and the
  # deterministic --soak-gpu stimulus schedule runs its full GPU contract. So
  # awl's "live-only" bug tier (present/compositor races, redraw-scheduling
  # gaps) is now reproducible in ordinary CI — and worth GATING on: a
  # soak-contract regression (frames stop presenting, an injected GPU fault
  # fails to recover, slideshow-grade degradation) should turn main red here.
  #
  # GATING (eyes-open, user decision 2026-07-22): the earlier three
  # failure-swallowing layers are GONE — the job-level and step-level
  # `continue-on-error: true`, and `scripts/ci-live-probe.sh`'s terminal
  # always-`exit 0`. The probe propagates a non-zero exit when the soak fails
  # its verification contract, and that exit reds the run. Still NOT run on
  # pull_request (fires on push to main and on manual workflow_dispatch) — a
  # SEPARATE job from the gating `mac` job, so it gates independently.
  #
  # ONE VERDICT (item 53, 2026-07-23): the soak BINARY's exit status is the sole
  # oracle. `report.passed()` owns every hard gate — a real surface, the
  # presents FLOOR (>=100), the absolute cycle contract (300/300/150), all three
  # faults recovered, and live memory samples — and `awl` bails nonzero on any
  # miss. `ci-live-probe.sh` only launches it and tails the report for humans;
  # it no longer re-derives a second, script-side pass/fail that could disagree
  # with the process exit. And the soak now RUNS TO SCHEDULE COMPLETION (bounded
  # by a 2x-duration grace), so a slightly-slow shared VM that walks the last
  # ~5% of the schedule late still PASSES instead of being guillotined at the
  # nominal 25s — the false-red that made every main push fail.
  mac-live-probe:
    name: mac live-probe (free mac-VM tier — gating)
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Launches a SHORT headful --soak-gpu and propagates the binary's exit
      # status — the single verdict (presents floor / cycle contract / faults /
      # recovery / memory all live in report.passed()). A soak-contract failure
      # exits non-zero and fails this (gating) job; the script only tails the
      # report for humans.
      - name: live-probe (does the mac VM present frames?)
        run: scripts/ci-live-probe.sh 25
