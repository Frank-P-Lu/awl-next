name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # System deps mirror Dockerfile.linux's apt-get list, PLUS
      # mesa-vulkan-drivers so the wgpu-backed capture tests have a software
      # Vulkan adapter to run against on a headless GitHub runner (there is
      # no real GPU here).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig1-dev libxkbcommon-dev libwayland-dev \
            libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            mesa-vulkan-drivers

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Dev-profile build + test, matching local practice (CLAUDE.md's build
      # section runs `cargo build` / `cargo test`, not --release). No
      # artifact upload for v1 — nothing built here is `--release`, and
      # speed matters more than a dev binary nobody will download.
      - name: cargo build
        run: cargo build

      # Linux-convention gate (settled): this job's `cargo test` runs under
      # `Convention::Linux` (a real `cfg(target_os)` fact on this runner — see
      # `Convention::current()`), which reads Ctrl-chords as the native slot
      # instead of macOS's ⌘-chords. Earlier rounds ran this step allow-failure
      # while the suite's tests — largely written against a Mac-only ambient
      # keymap — caught up; the whole convention-blindness sweep (pinning
      # hardcoded mac-literal test expectations to `Convention::Mac` explicitly,
      # or making chord-label assertions convention-parametric via the same
      # resolvers production code uses) is complete and the suite is genuinely
      # green under both conventions (verified via the `AWL_CONVENTION_FORCE`
      # dev knob locally, matching this runner's real `cfg(target_os)` path).
      # So this step is now a REAL, BLOCKING gate — no more allow-failure.
      - name: cargo test
        run: cargo test

  web:
    name: web (wasm build + smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: web

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      # wasm-bindgen-cli's version must match the crate's pinned wasm-bindgen
      # (Cargo.toml: 0.2.121, see WEB.md). trunk builds the release web
      # bundle (dist/) for the artifact upload.
      - name: Install wasm-bindgen-cli + trunk
        run: |
          cargo install wasm-bindgen-cli --version 0.2.121 --locked
          cargo install trunk --locked

      # L1 (crate compiles to wasm32) + L2 (src/websmoke.rs
      # #[wasm_bindgen_test]s run through the node runner) — see
      # scripts/web-smoke.sh's own header comment for the stage breakdown.
      - name: scripts/web-smoke.sh (L1 + L2)
        run: scripts/web-smoke.sh

      - name: trunk build --release
        run: trunk build --release

      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: dist/
          retention-days: 14

  mac:
    name: mac (build + test)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build

      - name: cargo test
        run: cargo test

  # ── The "free mac-VM tier" experiment (INFORMATIONAL, NEVER GATING) ─────────
  # GitHub's macos-latest runners are real macOS VMs with a WindowServer. Open
  # question: does a headful awl window actually PRESENT frames there, or does
  # the wgpu occlusion gate (an NSWindow lacking NSWindowOcclusionStateVisible
  # returns Occluded BEFORE nextDrawable() → presents=0 — see CLAUDE.md's
  # --soak-gpu tripwire) zero it? If frames flow, awl's "live-only" bug tier
  # (present/compositor races, redraw-scheduling gaps) is reproducible in
  # ordinary CI for free. Either answer is worth one CI run.
  #
  # NON-BLOCKING BY CONSTRUCTION — this can NEVER turn main red:
  #   1. It is a SEPARATE job from the gating `mac` job (no shared step; a hang
  #      or a nonzero exit here cannot touch mac's `cargo test`).
  #   2. `continue-on-error: true` at the JOB level makes the workflow ignore
  #      this job's conclusion entirely — so even a job-level timeout (a hang)
  #      is swallowed, not just a step failure.
  #   3. The step ALSO carries `continue-on-error: true` (belt and suspenders),
  #      and `scripts/ci-live-probe.sh` itself always `exit 0`s: a build error,
  #      a presents=0 contract FAIL (which makes `awl` exit nonzero), a missing
  #      report line, or a runner with no console session are all reported and
  #      swallowed. The presents count is echoed + written to the job summary
  #      regardless of outcome.
  # Not run on pull_request (informational only — keep PR checks lean); fires on
  # push to main and on manual workflow_dispatch.
  mac-live-probe:
    name: mac live-probe (free mac-VM tier — non-gating)
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Launches a SHORT headful --soak-gpu, greps `presents=N` from the report
      # line, and echoes a loud verdict. The wrapper always exits 0; the
      # step-level continue-on-error is a redundant guard.
      - name: live-probe (does the mac VM present frames?)
        continue-on-error: true
        run: scripts/ci-live-probe.sh 25
