# Syntax gallery sample — TOML.
#
# This paragraph is a prose comment: several stacked line comments that read
# as an explanation, not code, so they should render prominent rather than
# fading like the commented-out snippet below.

# retries = 3;
# connect(host, retries);

name = "awl-gallery"
greeting = 'hello, awl'
verbose = false
enabled = true
max_retries = 5
tau = 6.283185
tag = "c"
signed_offset = -12
scientific = 1.5e3
not_a_number = nan
infinity = inf

description = """
A multi-line basic string, closer to a small paragraph than a single
literal — TOML calls this form a "multiline basic string".
"""

[server]
host = "0.0.0.0"
port = 8080
retries = 5

[server.limits]
max_connections = 100
idle = false

[[server.routes]]
path = "/health"
method = "GET"

[[server.routes]]
path = "/status"
method = "GET"
