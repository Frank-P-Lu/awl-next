# Syntax gallery sample — YAML.
#
# Prose comment first: it reads as an explanation, not code, so it renders
# prominent rather than fading like the disabled snippet below.

# retries = 3;

name: awl-gallery
greeting: "hello, awl"
verbose: false
enabled: true
owner: null
missing: ~
max_retries: 5
tau: 6.283185
tag: 'c'
hex_flag: 0x1F
legacy_yes: yes
legacy_off: off

mode:
  kind: read
  idle: false

endpoints:
  - https://a.example.com
  - https://b.example.com

description: |
  This is a literal block scalar. It runs across several lines and
  behaves like a multi-line string literal, not a mapping key.

retries_by_env:
  dev: 1
  prod: 5

authors:
  - name: awl
    verified: true
  - name: gallery-bot
    verified: false

negative_offset: -3
scientific: 1.5e+2
