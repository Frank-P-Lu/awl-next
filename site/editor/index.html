<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>awl (web)</title>
    <!--
      The browser shell for the wasm build. Trunk reads this file, compiles the
      crate to wasm32-unknown-unknown, runs wasm-bindgen, and injects the loader
      that calls our `#[wasm_bindgen(start)]` entry (`wasm_start` in main.rs).

      awl renders into the <canvas id="awl-canvas"> below: `app::resumed` looks it
      up by id (web-sys) and hands it to winit via `with_canvas`, so the editor
      draws into THIS element rather than a detached one. The page is otherwise
      chrome-free — awl owns the whole viewport, matching the native window.
    -->
    
<script type="module">
import init, * as bindings from '/editor/awl-cdacdf39bafd48cd.js';
const wasm = await init({ module_or_path: '/editor/awl-cdacdf39bafd48cd_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
    <!-- GoatCounter (cookieless web analytics). Replace fluflu with your goatcounter.com site code. -->
    <script data-goatcounter="https://fluflu.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a1a;
      }
      /* The editor surface fills the viewport; winit sizes the backing store. */
      #awl-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        outline: none;
      }
      /* awl loading screen — a breathing amber block caret (awl's one warm thing)
         on the editor's own dark ground, so the cold wasm load is a calm room
         rather than a blank rectangle. Removed on TrunkApplicationStarted. */
      #awl-loading {
        position: fixed; inset: 0; z-index: 10;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; background: #1a1a1a; pointer-events: none;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        transition: opacity 420ms ease;
      }
      #awl-loading .caret {
        width: 15px; height: 30px; background: #e8a04c; border-radius: 1px;
        animation: awl-breathe 1500ms ease-in-out infinite;
      }
      #awl-loading .mark {
        font-size: 15px; letter-spacing: 0.35em; text-indent: 0.35em; color: #6a6a6a;
      }
      @keyframes awl-breathe {
        0%, 100% { opacity: 0.30; transform: scaleY(0.86); }
        50%      { opacity: 1.00; transform: scaleY(1.00); }
      }
      @media (prefers-reduced-motion: reduce) { #awl-loading .caret { animation: none; opacity: 0.9; } }
    </style>
  <link rel="modulepreload" href="/editor/awl-cdacdf39bafd48cd.js" crossorigin="anonymous" integrity="sha384-sgkvLYDzQLjrIeaOuJnG/XMErYpz1YMjdbtpls05+sOOaYCcqoKG7s/sWgTYB4ta"><link rel="preload" href="/editor/awl-cdacdf39bafd48cd_bg.wasm" crossorigin="anonymous" integrity="sha384-ODSsdb19tbPbTY5xOLYboDlelBX9mLNBrC/GFNEd1P4g16htgsAa3WmqYl3bC3BZ" as="fetch" type="application/wasm"></head>
  <body>
    <div id="awl-loading" role="status" aria-label="Loading awl">
      <div class="caret"></div>
      <div class="mark">awl</div>
    </div>
    <canvas id="awl-canvas"></canvas>
    <script>
      // Fade out + remove the loading screen once the wasm app has started
      // (Trunk dispatches TrunkApplicationStarted after the wasm module init).
      addEventListener("TrunkApplicationStarted", function () {
        var el = document.getElementById("awl-loading");
        if (!el) return;
        el.style.opacity = "0";
        setTimeout(function () { el.remove(); }, 460);
      });
    </script>
  </body>
</html>
