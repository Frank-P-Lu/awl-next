# awl website — static site (landing + the /editor wasm) on Fly.io.
# SCALE-TO-ZERO: the machine stops when idle and starts on the next request,
# so you pay compute only while it's actually serving (pennies/month for light
# traffic). primary_region is a guess (syd) — change it to your nearest.
app = "awl-editor"
primary_region = "syd"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
