# Trunk config for the awl browser (wasm) build.
#
# Trunk is the standard dev-server + wasm-bindgen wrapper for winit/wgpu wasm
# apps. `trunk serve` builds the crate for wasm32-unknown-unknown, runs the
# matching wasm-bindgen, wires index.html, and serves with live-reload; `trunk
# build --release` emits a deployable `dist/`.
#
# The NATIVE build is untouched by any of this — `cargo build` / `cargo test`
# never read this file. Everything wasm is additive.

[build]
# The shell that hosts the canvas + the generated loader.
target = "index.html"
# Emitted static site goes here (gitignore-able).
dist = "dist"

[watch]
# Keep trunk's own output out of its watch tree: without this, every rebuild's
# write into dist/ retriggers the watcher — a permanent ~7s rebuild+page-reload
# loop that burns CPU and resets the editor's cursor/prefix state mid-session
# (proven 2026-07-04 via the static-vs-serve differential documented in WEB.md).
ignore = ["dist", "target", ".claude", ".playwright-mcp", "gallery"]

[serve]
# `trunk serve` listens here; open http://127.0.0.1:8080 to run awl in a browser.
addresses = ["127.0.0.1"]
port = 8080
