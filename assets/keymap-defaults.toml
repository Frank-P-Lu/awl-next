# awl KEYMAP DEFAULTS — embedded at build time, never read from disk.
#
# THE ONE PLACE a command's DEFAULT chord(s) live (the "keymap defaults as
# data" round, CLAUDE.md). Keyed by the SAME slug `commands::slug()` derives
# from a catalog command's palette name (lower-case, spaces -> underscores,
# a trailing "…" stripped) — so this file and `commands::COMMANDS` can never
# name a command two different ways.
#
# Each entry under [commands] is a 2-element array: [native, emacs].
#   - slot 1 (native) is the MAC-LITERAL form ("Cmd-S") — the macOS Cmd chord.
#     On LINUX it is translated Cmd -> Ctrl at resolve time
#     (`commands::resolved_native`, `keyspec::translate_native_for_linux`),
#     with a short override table for the handful of commands where a naive
#     swap would be wrong (`commands::LINUX_NATIVE_OVERRIDE` — e.g. "Line
#     start"/"Line end" resolve to plain Home/End on every convention, not a
#     Ctrl-Left/Right that would collide with word motion).
#   - slot 2 (emacs) is OS-agnostic terse text ("C-s") and is NOT translated by
#     convention; on Linux it may still be quietly displaced by the native-wins
#     collision table (`keymap::LINUX_DISPLACED_LETTERS`, policy code, not data
#     — see keymap.rs's module doc) unless kept via `linux_keep_emacs`/
#     `keymap = "emacs"`.
# This table is EXHAUSTIVE: exactly one row per catalog command, no more, no
# fewer — `commands::COMMANDS` ASSERTS the count matches and PANICS at first
# access on any command that is absent here (or on any slug here that names no
# catalog command). A command with no default binding is written EXPLICITLY as
# ["", ""]; an empty string means that slot has no default. There is no
# "silently absent = unbound" path any more. Every command stays Cmd-P/rebind-
# menu addressable and independently rebindable via the user-facing
# `config.toml`'s `[keys]` table, which overlays on top of whatever this file
# resolves to, unchanged by this round.
#
# THIS FILE IS NOT `[keys]`. It is not read from `$XDG_CONFIG_HOME`, never
# hand-edited by a user, and carries no format-freeze promise beyond matching
# `commands::COMMANDS`' catalog order/slugs (law-tested — see
# `commands::tests::keymap_defaults_toml_*`).

# THE BUILT-IN LINUX KEEP FLOOR (formerly `keymap::LINUX_BUILTIN_KEEP`, a Rust
# const): chords that keep their EMACS meaning on Convention::Linux
# UNCONDITIONALLY, on every keymap flavor, overriding the native-wins
# collision table for exactly these chords (never removable by a user, only
# ADDED to via config `linux_keep_emacs`/`keymap = "emacs"`). Currently just
# kill-line: Links v2 spent Cmd-K (-> Ctrl-K on Linux) on Insert link, but
# kill-line is too load-bearing for emacs hands to lose by default.
linux_builtin_keep = ["C-k"]

